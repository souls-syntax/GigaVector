name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        timeout-minutes: 10
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libcurl4-openssl-dev \
            libssl-dev \
            libmicrohttpd-dev

      # ── macOS ──────────────────────────────────────────────────────────────
      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        timeout-minutes: 10
        run: |
          brew install cmake curl openssl

      # ── Windows (ucrt64 via pre-installed MSYS2) ──────────────────────────
      - name: Set up ucrt64 (Windows)
        if: matrix.os == 'windows-latest'
        timeout-minutes: 10
        shell: bash
        run: |
          C:/msys64/usr/bin/pacman -S --noconfirm --needed \
            mingw-w64-ucrt-x86_64-gcc \
            mingw-w64-ucrt-x86_64-cmake \
            mingw-w64-ucrt-x86_64-make \
            mingw-w64-ucrt-x86_64-curl \
            mingw-w64-ucrt-x86_64-openssl
          echo "C:/msys64/ucrt64/bin" >> "$GITHUB_PATH"

      # ── Build (Makefile — Linux/macOS only) ───────────────────────────────
      - name: Build library with Make
        if: matrix.os != 'windows-latest'
        timeout-minutes: 10
        run: make lib

      - name: Run C tests (Make)
        if: matrix.os != 'windows-latest'
        timeout-minutes: 10
        run: make c-test

      # ── Build (CMake — all platforms) ─────────────────────────────────────
      - name: Configure CMake build (Linux/macOS)
        if: matrix.os != 'windows-latest'
        timeout-minutes: 10
        run: cmake -S . -B build-cmake -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF

      - name: Configure CMake build (Windows)
        if: matrix.os == 'windows-latest'
        timeout-minutes: 10
        shell: bash
        run: cmake -S . -B build-cmake -G "MinGW Makefiles" -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF

      - name: Build with CMake
        timeout-minutes: 10
        run: cmake --build build-cmake --parallel

      - name: Run CMake tests
        timeout-minutes: 10
        run: ctest --test-dir build-cmake --output-on-failure --parallel --timeout 120

      # ── Python wheel ───────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install Python package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        timeout-minutes: 10
        run: python -m pip install ./python

      - name: Install Python package (Windows)
        if: matrix.os == 'windows-latest'
        timeout-minutes: 10
        shell: bash
        env:
          CMAKE_GENERATOR: "MinGW Makefiles"
        run: |
          python -m pip install delvewheel build
          python -m build --wheel ./python --outdir /tmp/wheels
          python -m delvewheel repair /tmp/wheels/gigavector*.whl -w /tmp/repaired
          python -m pip install /tmp/repaired/gigavector*.whl

      - name: Run Python tests
        timeout-minutes: 10
        run: python -m unittest discover -s python/tests -v

      - name: Lint and type-check Python (Linux only)
        if: matrix.os == 'ubuntu-latest'
        timeout-minutes: 10
        run: |
          python -m pip install ruff mypy
          ruff check python/src/gigavector/async_api.py python/src/gigavector/pool.py python/src/gigavector/benchmark.py
          mypy python/src/gigavector/async_api.py python/src/gigavector/pool.py python/src/gigavector/benchmark.py --ignore-missing-imports --follow-imports=silent

  # ── Sanitizer build (ASAN + UBSAN, Linux only) ──────────────────────────
  sanitizers:
    name: sanitizers (ASAN + UBSAN)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libcurl4-openssl-dev \
            libssl-dev \
            libmicrohttpd-dev

      - name: Configure with sanitizers
        timeout-minutes: 10
        run: |
          cmake -S . -B build-san \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DBUILD_BENCHMARKS=OFF \
            -DENABLE_SANITIZERS=ON

      - name: Build
        timeout-minutes: 10
        run: cmake --build build-san --parallel

      - name: Run tests under ASAN/UBSAN
        timeout-minutes: 10
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build-san --output-on-failure --parallel --timeout 120

  # ── libFuzzer + DST (clang, Linux only) ───────────────────────────────
  fuzz:
    name: libFuzzer + DST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang \
            libcurl4-openssl-dev \
            libssl-dev \
            libmicrohttpd-dev

      - name: Build library
        timeout-minutes: 10
        run: make lib

      - name: Run DST oracles
        timeout-minutes: 10
        run: |
          make c-test-single TEST=dst/test_repl_oracle
          make c-test-single TEST=dst/test_grpc_frame_dst

      - name: Generate fuzz corpus and run fuzzers
        timeout-minutes: 10
        run: |
          make fuzz-corpus
          make fuzz-run

  # ── Static analysis (cppcheck, Linux only) ──────────────────────────────
  static-analysis:
    name: static analysis (cppcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install cppcheck
        timeout-minutes: 10
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        timeout-minutes: 10
        run: |
          set -o pipefail
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            -I include \
            src/ 2>&1 | tee cppcheck-report.txt

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: cppcheck-report
          path: cppcheck-report.txt
